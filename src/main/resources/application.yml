server:
  port: ${PORT:8080}

spring:
  application:
    name: SWD392_BE
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/swd392_be?useSSL=false&serverTimezone=UTC}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:12345}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  # OAuth2 Configuration
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:default-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:default-client-secret}
            scope:
              - openid
              - email
              - profile
            redirect-uri: "${BASE_URL:http://localhost:8080}/login/oauth2/code/{registrationId}"
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://www.googleapis.com/oauth2/v4/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub

  # Multipart file upload
  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 25MB

  #App Password
  mail:
    host: ${EMAIL_HOST:smtp.gmail.com}
    port: ${EMAIL_PORT:587}
    username: ${EMAIL_USERNAME:noreply@example.com}
    password: ${EMAIL_PASSWORD:default}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# Cloudinary Configuration
cloudinary:
  cloud_name: ${CLOUDINARY_CLOUD_NAME:default}
  api_key: ${CLOUDINARY_API_KEY:default}
  api_secret: ${CLOUDINARY_SECRET_KEY:default}

# JWT Configuration
secret:
  jwt:
    secret-key: ${JWT_SECRET_KEY:default-secret-key-for-development-only-change-in-production}
    expiration-time: ${JWT_EXPIRATION_MS:86400000} # 1 day in milliseconds
    reset-expiration-time: 900000

# App Configuration
app:
  google:
    web-client-id: ${GOOGLE_CLIENT_ID:default-client-id}
    android-client-id: ${GOOGLE_ANDROID_CLIENT_ID:default-android-client-id}
  oauth2:
    authorized-redirect-uri: ${FRONTEND_URL:http://localhost:3000}/auth/callback
  openapi:
    dev-url: http://localhost:8080
    prod-url: ${BACKEND_PRODUCT_URL:http://localhost:8080}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
    allowed-methods: GET,POST,PUT,DELETE,OPTIONS

# Swagger/OpenAPI Configuration
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operationsSorter: method
    tagsSorter: alpha
    tryItOutEnabled: true
    filter: true
    syntaxHighlight:
      activated: true
